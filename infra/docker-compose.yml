name: tisei

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tisei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tisei}
      POSTGRES_DB: ${POSTGRES_DB:-tisei}
    ports:
      - "5433:5432"
    volumes:
      - tisei_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tisei} -d ${POSTGRES_DB:-tisei}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-tisei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tisei}
      POSTGRES_DB: ${POSTGRES_DB:-tisei}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      LIBRETRANSLATE_URL: http://libretranslate:5000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      YANDEX_TRANSLATE_API_KEY: ${YANDEX_TRANSLATE_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      LOG_RESET_CODES: ${LOG_RESET_CODES:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@tisei.app}
      SMTP_TLS: ${SMTP_TLS:-true}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
    ports:
      - "8001:8000"
    volumes:
      - ../backend:/code

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tisei.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - tisei_pgadmin:/var/lib/pgadmin

  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: ${LT_LOAD_ONLY:-en,ru,kk,es,de,fr,zh}
      LT_DISABLE_WEB_UI: "false"
    ports:
      - "5001:5000"
    volumes:
      - tisei_lt_models:/home/libretranslate/.local

volumes:
  tisei_pg:
  tisei_lt_models:
  tisei_pgadmin:
